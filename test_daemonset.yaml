apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-operator-serviceaccount
---
apiVersion: rbac.authorization.k8s.io/v1
# This cluster role binding allows anyone in the "manager" group to read secrets in any namespace.
kind: ClusterRoleBinding
metadata:
  name: secret-operator-clusterrolebinding
subjects:
  - kind: ServiceAccount
    name: secret-operator-serviceaccount
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: secret-operator-clusterrole
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-secret-operator-daemonset
  labels:
    app: deploy-secret-operator-daemonset
spec:
  selector:
    matchLabels:
      app: deploy-secret-operator-daemonset
  template:
    metadata:
      labels:
        app: deploy-secret-operator-daemonset
    spec:
      containers:
        - name: deploy-secret-operator-daemonset
          image: docker.stackable.tech/stackable/tools:0.2.0-stackable0.3.0
          command: ["bash", "-c", "echo 'Deploying DaemonSet' && kubectl apply -f /tmp/manifest/daemonset.yaml && echo 'Successfully deployed DaemonSet' && sleep infinity"]
          volumeMounts:
            - name: manifest
              mountPath: /tmp/manifest
      volumes:
      - name: manifest
        configMap:
          name: secret-operator-daemonset
      serviceAccountName: deployer
  replicas: 1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: secret-operator-daemonset
data:
  daemonset.yaml: |
    ---
    apiVersion: apps/v1
    kind: DaemonSet
    metadata:
      labels:
        app.kubernetes.io/instance: secret-operator
        app.kubernetes.io/name: secret-operator
        app.kubernetes.io/version: 23.1.0
      name: secret-operator-daemonset
    spec:
      selector:
        matchLabels:
          app.kubernetes.io/instance: secret-operator
          app.kubernetes.io/name: secret-operator
      template:
        metadata:
          creationTimestamp: null
          labels:
            app.kubernetes.io/instance: secret-operator
            app.kubernetes.io/name: secret-operator
        spec:
          containers:
          - name: secret-operator
            env:
            - name: CSI_ENDPOINT
              value: /csi/csi.sock
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            image: docker.stackable.tech/stackable/secret-operator:23.1.0
            imagePullPolicy: IfNotPresent
            securityContext:
              privileged: true
              runAsUser: 0
            volumeMounts:
            - mountPath: /csi
              name: csi
            - mountPath: /var/lib/kubelet/pods
              mountPropagation: Bidirectional
              name: mountpoint
          - args:
            - --csi-address=/csi/csi.sock
            - --feature-gates=Topology=true
            - --extra-create-metadata
            image: k8s.gcr.io/sig-storage/csi-provisioner:v3.1.0
            imagePullPolicy: IfNotPresent
            name: external-provisioner
            volumeMounts:
            - mountPath: /csi
              name: csi
          - args:
            - --csi-address=/csi/csi.sock
            - --kubelet-registration-path=/var/lib/kubelet/plugins/secrets.stackable.tech/csi.sock
            image: k8s.gcr.io/sig-storage/csi-node-driver-registrar:v2.4.0
            imagePullPolicy: IfNotPresent
            name: node-driver-registrar
            volumeMounts:
            - mountPath: /registration
              name: registration-sock
            - mountPath: /csi
              name: csi
          serviceAccount: secret-operator-serviceaccount
          serviceAccountName: secret-operator-serviceaccount
          volumes:
          - hostPath:
              path: /var/lib/kubelet/plugins_registry/secrets.stackable.tech-reg.sock
              type: ""
            name: registration-sock
          - hostPath:
              path: /var/lib/kubelet/plugins/secrets.stackable.tech/
              type: ""
            name: csi
          - hostPath:
              path: /var/lib/kubelet/pods/
              type: ""
            name: mountpoint
